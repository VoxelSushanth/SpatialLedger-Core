# Redis configuration for Store Intelligence System

# Bind to all interfaces within container
bind 0.0.0.0

# Port
port 6379

# Disable protected mode for container networking
protected-mode no

# Persistence - disable for performance (data is ephemeral)
save ""

# Max memory policy
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# TCP keepalive
tcp-keepalive 300

# Timeout (0 = no timeout)
timeout 0

# Databases
databases 16

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Enable Redis Streams
# (enabled by default in Redis 7)
