version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: store_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-store_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-store_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - store_network

  redis:
    image: redis:7
    container_name: store_redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - store_network

  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: store_ingestion
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-store_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VIDEO_PATH: ${VIDEO_PATH:-/data/videos}
      STORE_ID: ${STORE_ID:-ST1008}
      STORE_NAME: ${STORE_NAME:-Brigade_Bangalore}
      SIMULATION_MODE: ${SIMULATION_MODE:-auto}
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n.pt}
      TRIPWIRE_Y_RATIO: ${TRIPWIRE_Y_RATIO:-0.15}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - store_network

  consumer:
    build:
      context: ./services/consumer
      dockerfile: Dockerfile
    container_name: store_consumer
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-store_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORE_ID: ${STORE_ID:-ST1008}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ingestion:
        condition: service_started
    restart: on-failure
    networks:
      - store_network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: store_api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-store_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORE_ID: ${STORE_ID:-ST1008}
      STORE_NAME: ${STORE_NAME:-Brigade_Bangalore}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - store_network

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: store_dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: on-failure
    networks:
      - store_network

volumes:
  postgres_data:
  redis_data:

networks:
  store_network:
    driver: bridge
